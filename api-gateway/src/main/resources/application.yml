server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/login
          filters:
            - name: JwtAuthenticationFilter

        - id: user-service-public
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/save
          filters:
            - name: JwtAuthenticationFilter

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: JwtAuthenticationFilter

        - id: crop-service
          uri: ${CROP_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/crops/**
          filters:
            - name: JwtAuthenticationFilter

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  crop-service:
    url: ${CROP_SERVICE_URL:http://localhost:8082}

jwt:
  secret: ${JWT_SECRET:agroAppSuperSecretKey2024With32CharactersOrMore123456}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    pe.agro.gateway: ${LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method