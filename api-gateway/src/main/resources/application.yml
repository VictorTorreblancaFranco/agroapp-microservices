server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/login
          filters:
            - name: JwtAuthenticationFilter

        - id: user-service-public
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/save
          filters:
            - name: JwtAuthenticationFilter

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: JwtAuthenticationFilter

        - id: crop-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/crops/**
          filters:
            - name: JwtAuthenticationFilter

services:
  user-service:
    url: http://localhost:8081
  crop-service:
    url: http://localhost:8082

jwt:
  secret: agroAppSuperSecretKey2024With32CharactersOrMore123456
  expiration: 86400000

logging:
  level:
    pe.agro.gateway: DEBUG