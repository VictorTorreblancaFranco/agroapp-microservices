server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service
  r2dbc:
    url: ${DATABASE_URL:r2dbc:postgresql://localhost:5432/mi_base}
    username: ${DATABASE_USER:admin}
    password: ${DATABASE_PASSWORD:1234}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: user-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

logging:
  level:
    pe.agro.userservice: ${LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always