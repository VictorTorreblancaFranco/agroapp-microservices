services:
  postgresql:
    image: postgres:15
    platform: linux/amd64
    container_name: agroapp-postgres
    environment:
      POSTGRES_DB: mi_base
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - agroapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mi_base"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: wurstmeister/zookeeper:latest
    platform: linux/amd64
    container_name: agroapp-zookeeper
    ports:
      - "2181:2181"
    networks:
      - agroapp-network

  kafka:
    image: wurstmeister/kafka:latest
    platform: linux/amd64
    container_name: agroapp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - agroapp-network

  user-service:
    build: ./user-service
    container_name: agroapp-user-service
    environment:
      USER_SERVICE_PORT: 8081
      DATABASE_URL: r2dbc:postgresql://postgresql:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "8081:8081"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - agroapp-network

  crop-service:
    build: ./crop-service
    container_name: agroapp-crop-service
    environment:
      CROP_SERVICE_PORT: 8082
      DATABASE_URL: r2dbc:postgresql://postgresql:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "8082:8082"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - agroapp-network

  farm-service:
    build: ./farm-service
    container_name: agroapp-farm-service
    environment:
      FARM_SERVICE_PORT: 8083
      DATABASE_URL: r2dbc:postgresql://postgresql:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "8083:8083"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - agroapp-network

  sowing-service:
    build: ./sowing-service
    container_name: agroapp-sowing-service
    environment:
      SOWING_SERVICE_PORT: 8084
      DATABASE_URL: r2dbc:postgresql://postgresql:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "8084:8084"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - agroapp-network

  weather-service:
    build: ./weather-service
    container_name: agroapp-weather-service
    environment:
      WEATHER_SERVICE_PORT: 8085
      DATABASE_URL: r2dbc:postgresql://postgresql:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "8085:8085"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - agroapp-network

  prediction-service:
    build: ./prediction-service
    container_name: agroapp-prediction-service
    environment:
      PREDICTION_SERVICE_PORT: 8086
      DATABASE_URL: r2dbc:postgresql://postgresql:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "8086:8086"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - agroapp-network

  api-gateway:
    build: ./api-gateway
    container_name: agroapp-gateway
    environment:
      SERVER_PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      CROP_SERVICE_URL: http://crop-service:8082
      FARM_SERVICE_URL: http://farm-service:8083
      SOWING_SERVICE_URL: http://sowing-service:8084
      WEATHER_SERVICE_URL: http://weather-service:8085
      PREDICTION_SERVICE_URL: http://prediction-service:8086
      JWT_SECRET: agroAppSuperSecretKey2024With32CharactersOrMore123456
      JWT_EXPIRATION: 86400000
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - crop-service
      - farm-service
      - sowing-service
      - weather-service
      - prediction-service
    networks:
      - agroapp-network

networks:
  agroapp-network:
    driver: bridge

volumes:
  postgres_data: