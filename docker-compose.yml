services:
  user-service:
    build: ./user-service
    container_name: agroapp-user-service
    environment:
      USER_SERVICE_PORT: 8081
      DATABASE_URL: r2dbc:postgresql://host.docker.internal:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      LOG_LEVEL: INFO
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  crop-service:
    build: ./crop-service
    container_name: agroapp-crop-service
    environment:
      CROP_SERVICE_PORT: 8082
      DATABASE_URL: r2dbc:postgresql://host.docker.internal:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      LOG_LEVEL: INFO
    ports:
      - "8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  farm-service:
    build: ./farm-service
    container_name: agroapp-farm-service
    environment:
      FARM_SERVICE_PORT: 8083
      DATABASE_URL: r2dbc:postgresql://host.docker.internal:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      LOG_LEVEL: INFO
    ports:
      - "8083:8083"
    depends_on:
      - user-service
      - crop-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sowing-service:
    build: ./sowing-service
    container_name: agroapp-sowing-service
    environment:
      SOWING_SERVICE_PORT: 8084
      DATABASE_URL: r2dbc:postgresql://host.docker.internal:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      LOG_LEVEL: INFO
    ports:
      - "8084:8084"
    depends_on:
      - user-service
      - crop-service
      - farm-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

  weather-service:
    build: ./weather-service
    container_name: agroapp-weather-service
    environment:
      WEATHER_SERVICE_PORT: 8085
      DATABASE_URL: r2dbc:postgresql://host.docker.internal:5432/mi_base
      DATABASE_USER: admin
      DATABASE_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      LOG_LEVEL: INFO
    ports:
      - "8085:8085"
    depends_on:
      - user-service
      - crop-service
      - farm-service
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-gateway:
    build: ./api-gateway
    container_name: agroapp-gateway
    environment:
      SERVER_PORT: 8080
      USER_SERVICE_URL: http://user-service:8081
      CROP_SERVICE_URL: http://crop-service:8082
      FARM_SERVICE_URL: http://farm-service:8083
      SOWING_SERVICE_URL: http://sowing-service:8084
      WEATHER_SERVICE_URL: http://weather-service:8085
      JWT_SECRET: agroAppSuperSecretKey2024With32CharactersOrMore123456
      JWT_EXPIRATION: 86400000
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - crop-service
      - farm-service
      - sowing-service
      - weather-service
    extra_hosts:
      - "host.docker.internal:host-gateway"