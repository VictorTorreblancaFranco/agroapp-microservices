server:
  port: ${CROP_SERVICE_PORT:8082}

spring:
  application:
    name: crop-service
  r2dbc:
    url: ${DATABASE_URL:r2dbc:postgresql://localhost:5432/mi_base}
    username: ${DATABASE_USER:admin}
    password: ${DATABASE_PASSWORD:1234}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: crop-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

logging:
  level:
    pe.agro.cropservice: ${LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html